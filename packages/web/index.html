<!DOCTYPE html>
<html lang="zh-CN" class="theme-dark" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0F1117" />
  <link rel="icon" type="image/png" href="/icon-192.png" />

  <!-- 防缓存：iOS Safari 的 bfcache / Service Worker 会无视 HTTP 响应头 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- 字体预加载 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <title>CC Remote</title>

  <!-- 必须在模块脚本加载前执行：清除 Service Worker + Cache Storage + bfcache 刷新 -->
  <script>
    (function() {
      // 1. 注销所有 Service Worker 并清除 Cache Storage
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          return Promise.all(regs.map(function(r) { return r.unregister(); }));
        }).then(function() {
          if ('caches' in window) {
            return caches.keys().then(function(names) {
              return Promise.all(names.map(function(n) { return caches.delete(n); }));
            });
          }
        }).catch(function() {});
      }
      // 2. bfcache 恢复时强制网络加载（iOS Safari 会从快照恢复旧页面）
      window.addEventListener('pageshow', function(e) {
        if (e.persisted) { window.location.reload(); }
      });
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
